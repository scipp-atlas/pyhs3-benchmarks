name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    name: Smoke checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: latest
          cache: true
          locked: false

      - name: Compile Python files
        run: pixi run smoke

      - name: Run lint checks
        run: pixi run lint

      - name: Check formatting
        run: pixi run format-check
